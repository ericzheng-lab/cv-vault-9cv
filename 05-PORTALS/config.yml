# Film & Entertainment Industry Portal Scanner Config
# Customized for Eric Zheng - Film Producer targeting Netflix, Amazon Studios, Apple TV+, etc.

title_filter:
  positive:
    # Film/TV Production
    - "Executive Producer"
    - "Head of Production"
    - "VP of Production"
    - "Director of Production"
    - "Senior Producer"
    - "Line Producer"
    - "Unit Production Manager"
    - "Production Manager"
    # Creative
    - "Creative Director"
    - "Creative Producer"
    - "Creative Executive"
    - "Head of Content"
    - "VP of Content"
    - "Director of Content"
    - "Content Development"
    # Production & Operations
    - "Production Executive"
    - "Studio Operations"
    - "Production Management"
    - "Post-Production"
    - "VP of Operations"
    - "Director of Operations"
    # Business Affairs
    - "Business Affairs"
    - "Physical Production"
    - "Production Finance"
  negative:
    - "Junior"
    - "Intern"
    - "Coordinator"
    - "Assistant"
    - "Engineer"
    - "Developer"
    - "Software"
    - "Data Analyst"
    - "Accountant"
    - "HR"
    - "Recruiter"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "Executive"

search_queries:
  - name: Netflix Careers - Production
    query: 'site:jobs.netflix.com "Executive Producer" OR "Head of Production" OR "Senior Producer"'
    enabled: true

  - name: Amazon Studios - Production
    query: 'site:amazon.jobs "Executive Producer" OR "Head of Production" OR "Creative Director" studios'
    enabled: true

  - name: Apple TV+ - Production
    query: 'site:apple.com/jobs "Executive Producer" OR "Head of Production" "Apple TV"'
    enabled: true

  - name: Disney - Production
    query: 'site:disneycareers.com "Executive Producer" OR "VP Production" OR "Head of Production"'
    enabled: true

  - name: NBCUniversal - Production
    query: 'site:nbcuniversal.com "Executive Producer" OR "VP Production" OR "Director Production"'
    enabled: true

  - name: Warner Bros - Production
    query: 'site:warnerbroscareers.com "Executive Producer" OR "Head of Production" OR "Production Executive"'
    enabled: true

  - name: Paramount - Production
    query: 'site:paramountcareers.com "Executive Producer" OR "VP Production" OR "Head of Content"'
    enabled: true

  - name: A24 - Production
    query: 'site:a24.jobs OR site:linkedin.com/jobs "Executive Producer" OR "Head of Production" A24'
    enabled: true

  - name: MTV Entertainment - Production
    query: 'site:viacomcbscareers.com "Executive Producer" OR "VP Production" OR "Content Development"'
    enabled: true

  - name: Bloomberg Media - Production
    query: 'site:bloomberg.com/careers "Executive Producer" OR "Head of Production" OR "Content"'
    enabled: true

  - name: Vox Media - Production
    query: 'site:voxmedia.com "Executive Producer" OR "Head of Production" OR "VP Content"'
    enabled: true

  - name: The Athletic - Production
    query: '"Executive Producer" OR "Head of Production" "The Athletic" OR "New York Times"'
    enabled: true

